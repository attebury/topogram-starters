name: Starter Verification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Starter package smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@attebury"
      - name: Verify starter packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPOGRAM_CLI_PACKAGE_SPEC: "@attebury/topogram@0.2.61"
          EXPECTED_TOPOGRAM_CLI_VERSION: "0.2.61"
        run: npm run pack:check
