name: Starter Verification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Starter package smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@attebury"
      - name: Check catalog version helper
        run: npm run catalog:update -- tests/fixtures/topograms.catalog.json --check
      - name: Verify starter packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOPOGRAM_CLI_VERSION="$(cat topogram-cli.version)"
          TOPOGRAM_CLI_PACKAGE_SPEC="@attebury/topogram@$TOPOGRAM_CLI_VERSION" \
          EXPECTED_TOPOGRAM_CLI_VERSION="$TOPOGRAM_CLI_VERSION" \
            npm run pack:check
